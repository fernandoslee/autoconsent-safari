name: Validate

on: [push, pull_request]

jobs:
    lint:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v3
              with:
                  # Same-repo PRs: use branch name so the auto-fix step can push back.
                  # Fork PRs: use the PR head SHA (branch name only exists in the fork).
                  # Push events: fall through to github.ref.
                  ref: ${{ (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository && github.head_ref) || github.event.pull_request.head.sha || github.ref }}

            - uses: actions/setup-node@v3
              with:
                  node-version: lts/*
                  cache: 'npm'

            - run: npm ci

            - name: Auto-fix lint errors and push (PRs from the same repo only)
              if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository
              run: |
                  npm run lint-fix
                  git diff --quiet && exit 0
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add -A
                  git commit -m "chore: auto-fix lint errors"
                  git push

            - run: npm run lint

    test:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3
            - uses: actions/setup-node@v3
              with:
                  node-version: lts/*
                  cache: 'npm'
            - run: npm ci
            - run: npm run test:lib
