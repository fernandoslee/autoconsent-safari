name: Safari Unsigned Build

on:
    push:
        branches: [main]
        paths:
            - 'addon/**'
            - 'lib/**'
            - 'rules/**'
            - 'build.sh'
    workflow_dispatch:

permissions:
    contents: write

jobs:
    build-unsigned:
        runs-on: macos-14 # Apple Silicon; Xcode 15.x pre-installed

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Use Node.js LTS
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install Node dependencies
              run: npm ci

            - name: Build Safari extension bundle
              run: npm run prepublish

            - name: Verify Safari bundle
              run: |
                  ls dist/addon-safari/
                  [ ! -d dist/addon-safari/devtools ] \
                    || (echo "ERROR: devtools/ must not be in the Safari bundle" && exit 1)
                  ! grep -q "browsingData" dist/addon-safari/manifest.json \
                    || (echo "ERROR: browsingData must not be in manifest.json" && exit 1)

            - name: Generate Xcode project
              run: |
                  xcrun safari-web-extension-converter \
                    dist/addon-safari \
                    --project-location xcode/ \
                    --app-name "AutoconsentSafari" \
                    --bundle-identifier "com.yourorg.autoconsent-safari" \
                    --macos-only \
                    --no-open 2>&1 || true

            - name: Fix bundle identifier prefix
              run: |
                  # Extension first (more specific), then app — both need quoting for the hyphen
                  sed -i '' \
                    's/PRODUCT_BUNDLE_IDENTIFIER = com.yourorg.AutoconsentSafari.Extension;/PRODUCT_BUNDLE_IDENTIFIER = "com.yourorg.autoconsent-safari.Extension";/g' \
                    xcode/AutoconsentSafari/AutoconsentSafari.xcodeproj/project.pbxproj
                  sed -i '' \
                    's/PRODUCT_BUNDLE_IDENTIFIER = com.yourorg.AutoconsentSafari;/PRODUCT_BUNDLE_IDENTIFIER = "com.yourorg.autoconsent-safari";/g' \
                    xcode/AutoconsentSafari/AutoconsentSafari.xcodeproj/project.pbxproj

            - name: Inject host app window icon (before build)
              run: |
                  ICON_SRC="addon/icons/app-icon-1024.png"
                  # Replace the "enable extension" screen icon
                  sips -z 384 384 "$ICON_SRC" --out \
                    "xcode/AutoconsentSafari/AutoconsentSafari/Resources/Icon.png" >/dev/null

            - name: Get version
              run: |
                  VERSION=$(node -e "console.log(require('./package.json').version)")
                  echo "VERSION=$VERSION" >> "$GITHUB_ENV"

            - name: Build unsigned app
              run: |
                  xcodebuild build \
                    -project xcode/AutoconsentSafari/AutoconsentSafari.xcodeproj \
                    -scheme AutoconsentSafari \
                    -configuration Debug \
                    CODE_SIGN_IDENTITY="-" \
                    CODE_SIGNING_REQUIRED=NO \
                    -quiet

            - name: Inject app icon (post-build)
              run: |
                  APP=$(find ~/Library/Developer/Xcode/DerivedData/AutoconsentSafari-*/Build/Products/Debug \
                    -name "AutoconsentSafari.app" | head -1)
                  ICON_SRC="addon/icons/app-icon-1024.png"
                  ICONSET="$RUNNER_TEMP/AppIcon.iconset"
                  mkdir -p "$ICONSET"
                  for size in 16 32 128 256 512; do
                    sips -z $size $size "$ICON_SRC" --out "$ICONSET/icon_${size}x${size}.png" >/dev/null
                    double=$((size * 2))
                    sips -z $double $double "$ICON_SRC" --out "$ICONSET/icon_${size}x${size}@2x.png" >/dev/null
                  done
                  iconutil -c icns "$ICONSET" -o "$APP/Contents/Resources/AppIcon.icns"
                  /usr/libexec/PlistBuddy -c "Add :CFBundleIconFile string AppIcon" "$APP/Contents/Info.plist" 2>/dev/null \
                    || /usr/libexec/PlistBuddy -c "Set :CFBundleIconFile AppIcon" "$APP/Contents/Info.plist"
                  # Re-sign ONLY the outer app — no --deep, preserves extension signature
                  codesign --force --sign - "$APP"

            - name: Zip app
              run: |
                  APP=$(find ~/Library/Developer/Xcode/DerivedData/AutoconsentSafari-*/Build/Products/Debug \
                    -name "AutoconsentSafari.app" | head -1)
                  ditto -c -k --keepParent "$APP" \
                    "$RUNNER_TEMP/AutoconsentSafari-${{ env.VERSION }}-unsigned.zip"

            - name: Upload artifact
              uses: actions/upload-artifact@v4
              with:
                  name: AutoconsentSafari-${{ env.VERSION }}-unsigned
                  path: ${{ runner.temp }}/AutoconsentSafari-*-unsigned.zip
                  retention-days: 30

            - name: Update latest pre-release
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  # Delete previous latest release + tag so we can recreate fresh
                  gh release delete latest --yes 2>/dev/null || true
                  git push origin :refs/tags/latest 2>/dev/null || true

                  cat > "$RUNNER_TEMP/release-notes.md" <<EOF
                  Unsigned build of Autoconsent $VERSION for Safari. No Apple Developer account required.

                  ## Install

                  1. Download **AutoconsentSafari-${VERSION}-unsigned.zip** below and unzip it
                  2. Remove the macOS quarantine flag:
                     \`\`\`bash
                     xattr -cr AutoconsentSafari.app
                     \`\`\`
                  3. Open **AutoconsentSafari.app** (Safari will warn it is unsigned — this is expected)
                  4. In Safari: **Settings → Extensions → Enable Autoconsent**
                  5. Set Website Access to **Allow on All Websites**

                  That's it. The extension will now automatically dismiss cookie consent popups.

                  ---
                  Built from [duckduckgo/autoconsent](https://github.com/duckduckgo/autoconsent) $VERSION.
                  EOF

                  gh release create latest \
                    --prerelease \
                    --title "Latest unsigned build ($VERSION)" \
                    --notes-file "$RUNNER_TEMP/release-notes.md" \
                    "$RUNNER_TEMP/AutoconsentSafari-${VERSION}-unsigned.zip"
