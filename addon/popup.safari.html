<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080b10;
        --bg-2: #0f1520;
        --bg-3: #162030;
        --bg-4: #1e2d40;
        --accent: #10b981;
        --accent-lo: rgba(16, 185, 129, 0.12);
        --accent-mid: rgba(16, 185, 129, 0.35);
        --danger: #f43f5e;
        --danger-lo: rgba(244, 63, 94, 0.12);
        --warn: #f59e0b;
        --text: #e2e8f0;
        --text-2: #94a3b8;
        --text-3: #475569;
        --border: rgba(255, 255, 255, 0.06);
        --border-2: rgba(255, 255, 255, 0.1);
        --r: 8px;
        --r-sm: 5px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        width: 300px;
        background: var(--bg);
        font-family: "DM Sans", -apple-system, sans-serif;
        font-size: 13px;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      body {
        width: 300px;
        overflow: hidden;
      }

      /* ── Proceed button (injected by popup.bundle.js) ─────────────── */
      #proceed {
        display: block;
        width: calc(100% - 24px);
        margin: 12px 12px 0;
        padding: 10px 0;
        border-radius: var(--r);
        border: 1px solid var(--accent-mid);
        background: var(--accent-lo);
        color: var(--accent);
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      #proceed:hover {
        background: rgba(16, 185, 129, 0.2);
        border-color: var(--accent);
      }

      /* ── Header ───────────────────────────────────────────────────── */
      .hd {
        padding: 14px 14px 12px;
        background: linear-gradient(160deg, #0d1825 0%, var(--bg) 100%);
        border-bottom: 1px solid var(--border);
        position: relative;
        overflow: hidden;
      }

      .hd::before {
        content: "";
        position: absolute;
        top: -40px;
        right: -40px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
        pointer-events: none;
      }

      .hd-top {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
      }

      .status-ring {
        position: relative;
        width: 10px;
        height: 10px;
        flex-shrink: 0;
      }

      .status-ring::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: var(--accent);
        animation: glow-pulse 2.5s ease-in-out infinite;
      }

      .status-ring::after {
        content: "";
        position: absolute;
        inset: 2px;
        border-radius: 50%;
        background: var(--accent);
      }

      .status-ring.off::before,
      .status-ring.off::after {
        background: var(--text-3);
        animation: none;
      }

      @keyframes glow-pulse {
        0%,
        100% {
          opacity: 0.35;
          transform: scale(1.8);
        }
        50% {
          opacity: 0;
          transform: scale(2.4);
        }
      }

      .brand {
        font-family: "Syne", sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-3);
      }

      .hd-site {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .site-name {
        font-family: "DM Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      /* ── Master toggle ────────────────────────────────────────────── */
      .master-wrap {
        position: relative;
        flex-shrink: 0;
        width: 42px;
        height: 23px;
      }

      #enabled {
        position: absolute;
        inset: 0;
        opacity: 0;
        width: 100%;
        height: 100%;
        cursor: pointer;
        z-index: 2;
      }

      .master-track {
        position: absolute;
        inset: 0;
        border-radius: 12px;
        background: var(--bg-3);
        border: 1px solid var(--border-2);
        transition: background 0.2s, border-color 0.2s;
      }

      .master-thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: var(--text-3);
        transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
      }

      #enabled:checked ~ .master-track {
        background: var(--accent-lo);
        border-color: var(--accent-mid);
      }

      #enabled:checked ~ .master-thumb {
        background: var(--accent);
        transform: translateX(19px);
        box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
      }

      /* ── Section ──────────────────────────────────────────────────── */
      .sec {
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
      }

      .sec-lbl {
        font-family: "Syne", sans-serif;
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-3);
        margin-bottom: 8px;
      }

      /* ── Mode pills ───────────────────────────────────────────────── */
      .mode-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 3px;
        background: var(--bg-2);
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        padding: 3px;
      }

      .mpill {
        position: relative;
      }

      .mpill input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
        z-index: 1;
      }

      .mpill-lbl {
        display: block;
        text-align: center;
        padding: 5px 4px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-3);
        border: 1px solid transparent;
        transition: all 0.15s;
        user-select: none;
        cursor: pointer;
      }

      .mpill input:checked + .mpill-lbl {
        color: var(--text);
        background: var(--bg-4);
        border-color: var(--border-2);
      }

      #optout:checked + .mpill-lbl {
        color: var(--accent);
        background: var(--accent-lo);
        border-color: var(--accent-mid);
      }

      #optin:checked + .mpill-lbl {
        color: var(--danger);
        background: var(--danger-lo);
        border-color: rgba(244, 63, 94, 0.3);
      }

      /* ── Toggle rows ──────────────────────────────────────────────── */
      .t-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.025);
      }

      .t-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .t-lbl {
        font-size: 12px;
        font-weight: 400;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .badge {
        font-size: 7.5px;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 1px 4px 1.5px;
        border-radius: 3px;
        background: rgba(245, 158, 11, 0.15);
        color: var(--warn);
        text-transform: uppercase;
      }

      /* ── Small toggle ─────────────────────────────────────────────── */
      .stog {
        position: relative;
        width: 34px;
        height: 19px;
        flex-shrink: 0;
      }

      /* Radios must NOT be display:none — labels can't activate those.
         Keep them in the DOM but invisible. */
      .stog input[type="radio"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }

      /* Full-area label — handles the click natively */
      .stog-tap {
        position: absolute;
        inset: 0;
        z-index: 2;
        cursor: pointer;
      }

      .stog-track {
        position: absolute;
        inset: 0;
        border-radius: 10px;
        background: var(--bg-3);
        border: 1px solid var(--border-2);
        transition: background 0.18s, border-color 0.18s;
        z-index: 0;
      }

      .stog-thumb {
        position: absolute;
        top: 2.5px;
        left: 2.5px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--text-3);
        transition: transform 0.18s, background 0.18s;
        z-index: 1;
      }

      .stog.on .stog-track {
        background: var(--accent-lo);
        border-color: var(--accent-mid);
      }

      .stog.on .stog-thumb {
        background: var(--accent);
        transform: translateX(15px);
      }

      /* ── Debug section ────────────────────────────────────────────── */
      .dbg-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
      }

      .dbg-hd-lbl {
        font-family: "Syne", sans-serif;
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-3);
      }

      .dbg-chevron {
        width: 12px;
        height: 12px;
        color: var(--text-3);
        transition: transform 0.2s;
      }

      .dbg-chevron.open {
        transform: rotate(180deg);
      }

      .dbg-body {
        display: none;
        padding: 8px 14px 10px;
        border-bottom: 1px solid var(--border);
      }

      .dbg-body.open {
        display: block;
      }

      .dbg-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px 8px;
        margin-bottom: 10px;
      }

      .dbg-chk {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 0;
      }

      .dbg-chk input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 3px;
        background: var(--bg-3);
        border: 1px solid var(--border-2);
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
        transition: background 0.12s, border-color 0.12s;
      }

      .dbg-chk input[type="checkbox"]:checked {
        background: var(--accent);
        border-color: var(--accent);
      }

      .dbg-chk input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        top: 0.5px;
        left: 3px;
        width: 4px;
        height: 7px;
        border: 1.5px solid #000;
        border-top: none;
        border-left: none;
        transform: rotate(40deg);
      }

      .dbg-chk label {
        font-size: 11px;
        color: var(--text-2);
        cursor: pointer;
        line-height: 1;
      }

      .retries-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 4px;
      }

      .retries-row label {
        font-size: 11px;
        color: var(--text-2);
      }

      #retries {
        width: 50px;
        background: var(--bg-3);
        border: 1px solid var(--border-2);
        border-radius: var(--r-sm);
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 12px;
        padding: 4px 6px;
        text-align: center;
        outline: none;
        transition: border-color 0.15s;
      }

      #retries:focus {
        border-color: var(--accent-mid);
      }

      /* ── Footer ───────────────────────────────────────────────────── */
      .ft {
        display: flex;
        gap: 6px;
        padding: 10px 14px;
      }

      .ft-btn {
        flex: 1;
        padding: 7px 0;
        border-radius: var(--r-sm);
        background: var(--bg-2);
        border: 1px solid var(--border);
        color: var(--text-3);
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.12s, color 0.12s, border-color 0.12s;
      }

      .ft-btn:hover {
        background: var(--bg-3);
        color: var(--text-2);
        border-color: var(--border-2);
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="hd">
      <div class="hd-top">
        <div class="status-ring" id="status-ring"></div>
        <span class="brand">Autoconsent</span>
      </div>
      <div class="hd-site">
        <span class="site-name" id="current-site">—</span>
        <label class="master-wrap">
          <input type="checkbox" id="enabled" name="enabled" checked />
          <div class="master-track"></div>
          <div class="master-thumb"></div>
        </label>
      </div>
    </div>

    <!-- Mode -->
    <div class="sec">
      <div class="sec-lbl">Mode</div>
      <div class="mode-row">
        <div class="mpill">
          <input type="radio" id="optout" name="mode" value="optOut" checked />
          <label class="mpill-lbl" for="optout">Reject</label>
        </div>
        <div class="mpill">
          <input type="radio" id="optin" name="mode" value="optIn" />
          <label class="mpill-lbl" for="optin">Accept</label>
        </div>
        <div class="mpill">
          <input type="radio" id="prompt" name="mode" value="null" />
          <label class="mpill-lbl" for="prompt">Ask</label>
        </div>
      </div>
    </div>

    <!-- Protection -->
    <div class="sec">
      <div class="sec-lbl">Protection</div>

      <div class="t-row">
        <span class="t-lbl">Pre-hide popups</span>
        <div class="stog" data-on="prehide-on" data-off="prehide-off">
          <input type="radio" id="prehide-on" name="prehide" value="true" checked />
          <input type="radio" id="prehide-off" name="prehide" value="false" />
          <label class="stog-tap" for="prehide-off"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="t-row">
        <span class="t-lbl">Cosmetic rules</span>
        <div class="stog" data-on="cosmetic-on" data-off="cosmetic-off">
          <input type="radio" id="cosmetic-on" name="cosmetic" value="true" checked />
          <input type="radio" id="cosmetic-off" name="cosmetic" value="false" />
          <label class="stog-tap" for="cosmetic-off"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="t-row">
        <span class="t-lbl">Generated rules</span>
        <div class="stog" data-on="generated-on" data-off="generated-off">
          <input type="radio" id="generated-on" name="generated" value="true" checked />
          <input type="radio" id="generated-off" name="generated" value="false" />
          <label class="stog-tap" for="generated-off"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="t-row">
        <span class="t-lbl">
          Unknown popups
          <span class="badge">β</span>
        </span>
        <div class="stog" data-on="heuristic-action-on" data-off="heuristic-action-off">
          <input type="radio" id="heuristic-action-on" name="heuristic-action" value="true" />
          <input type="radio" id="heuristic-action-off" name="heuristic-action" value="false" checked />
          <label class="stog-tap" for="heuristic-action-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="t-row">
        <span class="t-lbl">Highlight clicks</span>
        <div class="stog" data-on="visual-test-on" data-off="visual-test-off">
          <input type="radio" id="visual-test-on" name="visual-test" value="true" checked />
          <input type="radio" id="visual-test-off" name="visual-test" value="false" />
          <label class="stog-tap" for="visual-test-off"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>
    </div>

    <!-- Debug -->
    <div class="dbg-hd" id="dbg-hd">
      <span class="dbg-hd-lbl">Debug logging</span>
      <svg class="dbg-chevron" id="dbg-chevron" viewBox="0 0 12 12" fill="none">
        <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </div>
    <div class="dbg-body" id="dbg-body">
      <div class="dbg-grid">
        <div class="dbg-chk">
          <input type="checkbox" id="logs-lifecycle" name="logs-lifecycle" checked />
          <label for="logs-lifecycle">Lifecycle</label>
        </div>
        <div class="dbg-chk">
          <input type="checkbox" id="logs-rulesteps" name="logs-rulesteps" checked />
          <label for="logs-rulesteps">Rule steps</label>
        </div>
        <div class="dbg-chk">
          <input type="checkbox" id="logs-detectionsteps" name="logs-detectionsteps" />
          <label for="logs-detectionsteps">Detection</label>
        </div>
        <div class="dbg-chk">
          <input type="checkbox" id="logs-waits" name="logs-waits" />
          <label for="logs-waits">Wait steps</label>
        </div>
        <div class="dbg-chk">
          <input type="checkbox" id="logs-evals" name="logs-evals" />
          <label for="logs-evals">Evals</label>
        </div>
        <div class="dbg-chk">
          <input type="checkbox" id="logs-errors" name="logs-errors" checked />
          <label for="logs-errors">Errors</label>
        </div>
        <div class="dbg-chk">
          <input type="checkbox" id="logs-messages" name="logs-messages" />
          <label for="logs-messages">Messages</label>
        </div>
      </div>
      <div class="retries-row">
        <label for="retries">Detection attempts</label>
        <input type="number" id="retries" name="retries" value="20" min="1" max="100" />
      </div>
    </div>

    <!-- Footer -->
    <div class="ft">
      <button class="ft-btn" id="reload">↺ Reload rules</button>
      <button class="ft-btn" id="reset">Reset</button>
    </div>

    <script src="popup.bundle.js"></script>
    <script>
      // ── Radio-pair → visual toggle sync ────────────────────────────
      // The .stog-tap label handles clicks natively (no synthetic events).
      // We only need to sync the visual class and flip the label's `for`
      // whenever the radio state changes.
      function setupToggles() {
        document.querySelectorAll(".stog[data-on]").forEach((stog) => {
          const onId = stog.dataset.on;
          const offId = stog.dataset.off;
          const onInp = document.getElementById(onId);
          const offInp = document.getElementById(offId);
          const tap = stog.querySelector(".stog-tap");

          function sync() {
            const isOn = onInp.checked;
            stog.classList.toggle("on", isOn);
            // Point label to whichever radio is NOT currently checked
            // so clicking always toggles to the opposite state.
            if (tap) tap.htmlFor = isOn ? offId : onId;
          }

          onInp.addEventListener("change", sync);
          offInp.addEventListener("change", sync);

          sync();
        });
      }

      // ── Status ring follows #enabled ────────────────────────────────
      function syncRing() {
        const ring = document.getElementById("status-ring");
        const en = document.getElementById("enabled");
        ring.classList.toggle("off", !en.checked);
      }

      // ── Debug accordion ─────────────────────────────────────────────
      document.getElementById("dbg-hd").addEventListener("click", () => {
        document.getElementById("dbg-body").classList.toggle("open");
        document.getElementById("dbg-chevron").classList.toggle("open");
      });

      // ── Init after popup.bundle.js sets storage-backed state ────────
      // bundle.js does async chrome.storage reads before setting .checked,
      // so we defer our visual sync slightly.
      window.addEventListener("load", () => {
        setTimeout(() => {
          setupToggles();
          syncRing();
          document.getElementById("enabled").addEventListener("change", syncRing);
        }, 80);
      });
    </script>
  </body>
</html>
