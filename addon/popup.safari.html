<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:opsz,wght@9..40,300;400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #080b10;
        --bg-2: #0f1520;
        --bg-3: #162030;
        --bg-4: #1e2d40;
        --accent: #10b981;
        --accent-lo: rgba(16, 185, 129, 0.12);
        --accent-mid: rgba(16, 185, 129, 0.35);
        --danger: #f43f5e;
        --danger-lo: rgba(244, 63, 94, 0.12);
        --warn: #f59e0b;
        --text: #e2e8f0;
        --text-2: #94a3b8;
        --text-3: #475569;
        --border: rgba(255, 255, 255, 0.06);
        --border-2: rgba(255, 255, 255, 0.1);
        --r: 8px;
        --r-sm: 5px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        width: 300px;
        background: var(--bg);
        font-family: "DM Sans", -apple-system, sans-serif;
        font-size: 13px;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }

      body {
        width: 300px;
        overflow: hidden;
      }

      /* ── Proceed button (injected by popup.bundle.js) ─────────────── */
      #proceed {
        display: block;
        width: calc(100% - 24px);
        margin: 12px 12px 0;
        padding: 10px 0;
        border-radius: var(--r);
        border: 1px solid var(--accent-mid);
        background: var(--accent-lo);
        color: var(--accent);
        font-family: "DM Sans", sans-serif;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.02em;
        cursor: pointer;
        transition: background 0.15s, border-color 0.15s;
      }

      #proceed:hover {
        background: rgba(16, 185, 129, 0.2);
        border-color: var(--accent);
      }

      /* ── Header ───────────────────────────────────────────────────── */
      .hd {
        padding: 14px 14px 12px;
        background: linear-gradient(160deg, #0d1825 0%, var(--bg) 100%);
        border-bottom: 1px solid var(--border);
        position: relative;
        overflow: hidden;
      }

      .hd::before {
        content: "";
        position: absolute;
        top: -40px;
        right: -40px;
        width: 120px;
        height: 120px;
        border-radius: 50%;
        background: radial-gradient(circle, rgba(16, 185, 129, 0.08) 0%, transparent 70%);
        pointer-events: none;
      }

      .hd-top {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-bottom: 10px;
      }

      /* ── Status ring: driven by #enabled state via :has() ─────────── */
      .status-ring {
        position: relative;
        width: 10px;
        height: 10px;
        flex-shrink: 0;
      }

      .status-ring::before {
        content: "";
        position: absolute;
        inset: 0;
        border-radius: 50%;
        background: var(--accent);
        animation: glow-pulse 2.5s ease-in-out infinite;
      }

      .status-ring::after {
        content: "";
        position: absolute;
        inset: 2px;
        border-radius: 50%;
        background: var(--accent);
      }

      /* When master toggle is off, ring goes gray — pure CSS via :has() */
      html:has(#enabled:not(:checked)) .status-ring::before,
      html:has(#enabled:not(:checked)) .status-ring::after {
        background: var(--text-3);
        animation: none;
      }

      @keyframes glow-pulse {
        0%,
        100% {
          opacity: 0.35;
          transform: scale(1.8);
        }
        50% {
          opacity: 0;
          transform: scale(2.4);
        }
      }

      .brand {
        font-family: "Syne", sans-serif;
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--text-3);
      }

      .hd-site {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
      }

      .site-name {
        font-family: "DM Mono", monospace;
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        min-width: 0;
      }

      /* ── Master toggle ────────────────────────────────────────────── */
      /* The <label> wraps the checkbox + track + thumb, so clicking
         anywhere on it toggles the checkbox natively. CSS :checked
         sibling selectors drive the visual — no JavaScript needed.   */
      .master-wrap {
        position: relative;
        flex-shrink: 0;
        width: 42px;
        height: 23px;
        cursor: pointer;
      }

      #enabled {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }

      .master-track {
        position: absolute;
        inset: 0;
        border-radius: 12px;
        background: var(--bg-3);
        border: 1px solid var(--border-2);
        transition: background 0.2s, border-color 0.2s;
      }

      .master-thumb {
        position: absolute;
        top: 3px;
        left: 3px;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: var(--text-3);
        transition: transform 0.2s, background 0.2s, box-shadow 0.2s;
      }

      #enabled:checked ~ .master-track {
        background: var(--accent-lo);
        border-color: var(--accent-mid);
      }

      #enabled:checked ~ .master-thumb {
        background: var(--accent);
        transform: translateX(19px);
        box-shadow: 0 0 6px rgba(16, 185, 129, 0.5);
      }

      /* ── Section ──────────────────────────────────────────────────── */
      .sec {
        padding: 11px 14px;
        border-bottom: 1px solid var(--border);
      }

      .sec-lbl {
        font-family: "Syne", sans-serif;
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-3);
        margin-bottom: 8px;
      }

      /* ── Mode pills ───────────────────────────────────────────────── */
      .mode-row {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 3px;
        background: var(--bg-2);
        border: 1px solid var(--border);
        border-radius: var(--r-sm);
        padding: 3px;
      }

      .mpill {
        position: relative;
      }

      /* Radio is hidden; the <label for=""> handles the click natively */
      .mpill input {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }

      .mpill-lbl {
        display: block;
        text-align: center;
        padding: 5px 4px;
        border-radius: 3px;
        font-size: 11px;
        font-weight: 500;
        color: var(--text-3);
        border: 1px solid transparent;
        transition: all 0.15s;
        user-select: none;
        cursor: pointer;
      }

      /* Adjacent sibling: input is immediately before the label */
      #optout:checked + .mpill-lbl {
        color: var(--accent);
        background: var(--accent-lo);
        border-color: var(--accent-mid);
      }

      #optin:checked + .mpill-lbl {
        color: var(--danger);
        background: var(--danger-lo);
        border-color: rgba(244, 63, 94, 0.3);
      }

      #prompt:checked + .mpill-lbl {
        color: var(--text);
        background: var(--bg-4);
        border-color: var(--border-2);
      }

      /* ── Toggle rows ──────────────────────────────────────────────── */
      .t-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.025);
      }

      .t-row:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }

      .t-lbl {
        font-size: 12px;
        font-weight: 400;
        color: var(--text);
        display: flex;
        align-items: center;
        gap: 5px;
      }

      .badge {
        font-size: 7.5px;
        font-weight: 700;
        letter-spacing: 0.04em;
        padding: 1px 4px 1.5px;
        border-radius: 3px;
        background: rgba(245, 158, 11, 0.15);
        color: var(--warn);
        text-transform: uppercase;
      }

      /* ── Small toggle (radio pair) ────────────────────────────────── */
      /*
       * Layout (in DOM order):
       *   input[value="true"]   ← "on" radio
       *   input[value="false"]  ← "off" radio
       *   label.stog-on-lbl     ← visible when ON; clicking → turns off
       *   label.stog-off-lbl    ← visible when OFF; clicking → turns on
       *   div.stog-track
       *   div.stog-thumb
       *
       * Visual state and label visibility are 100% CSS-driven via :checked
       * sibling selectors. No JavaScript needed — popup.ts's programmatic
       * .checked assignments and user label clicks both work automatically.
       */
      .stog {
        position: relative;
        width: 34px;
        height: 19px;
        flex-shrink: 0;
      }

      /* Radios: accessible to labels but invisible and non-interactive */
      .stog input[type="radio"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }

      /* Labels cover the full toggle area */
      .stog-on-lbl,
      .stog-off-lbl {
        display: none; /* hidden unless revealed by :checked rule below */
        position: absolute;
        inset: 0;
        z-index: 2;
        cursor: pointer;
      }

      /* Show the label that will toggle to the OPPOSITE state */
      .stog input[value="true"]:checked ~ .stog-on-lbl {
        display: block; /* ON is active → show label that turns it OFF */
      }

      .stog input[value="false"]:checked ~ .stog-off-lbl {
        display: block; /* OFF is active → show label that turns it ON */
      }

      /* Track and thumb — default (off) state */
      .stog-track {
        position: absolute;
        inset: 0;
        border-radius: 10px;
        background: var(--bg-3);
        border: 1px solid var(--border-2);
        transition: background 0.18s, border-color 0.18s;
      }

      .stog-thumb {
        position: absolute;
        top: 2.5px;
        left: 2.5px;
        width: 12px;
        height: 12px;
        border-radius: 50%;
        background: var(--text-3);
        transition: transform 0.18s, background 0.18s;
      }

      /* Active (on) state — triggered by CSS, no JS */
      .stog input[value="true"]:checked ~ .stog-track {
        background: var(--accent-lo);
        border-color: var(--accent-mid);
      }

      .stog input[value="true"]:checked ~ .stog-thumb {
        background: var(--accent);
        transform: translateX(15px);
      }

      /* ── Debug section (<details>/<summary>) ─────────────────────── */
      /* Hide the browser's native disclosure triangle */
      .dbg-details > summary {
        list-style: none;
      }
      .dbg-details > summary::-webkit-details-marker {
        display: none;
      }

      .dbg-hd {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-bottom: 1px solid var(--border);
        cursor: pointer;
        user-select: none;
      }

      .dbg-hd-lbl {
        font-family: "Syne", sans-serif;
        font-size: 8.5px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--text-3);
      }

      .dbg-chevron {
        width: 12px;
        height: 12px;
        color: var(--text-3);
        transition: transform 0.2s;
      }

      /* Rotate chevron when details is open — no JS needed */
      .dbg-details[open] .dbg-chevron {
        transform: rotate(180deg);
      }

      .dbg-body {
        padding: 8px 14px 10px;
        border-bottom: 1px solid var(--border);
      }

      .dbg-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px 8px;
        margin-bottom: 10px;
      }

      .dbg-chk {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 0;
      }

      .dbg-chk input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 3px;
        background: var(--bg-3);
        border: 1px solid var(--border-2);
        cursor: pointer;
        position: relative;
        flex-shrink: 0;
        transition: background 0.12s, border-color 0.12s;
      }

      .dbg-chk input[type="checkbox"]:checked {
        background: var(--accent);
        border-color: var(--accent);
      }

      .dbg-chk input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        top: 0.5px;
        left: 3px;
        width: 4px;
        height: 7px;
        border: 1.5px solid #000;
        border-top: none;
        border-left: none;
        transform: rotate(40deg);
      }

      .dbg-chk label {
        font-size: 11px;
        color: var(--text-2);
        cursor: pointer;
        line-height: 1;
      }

      .retries-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding-top: 4px;
      }

      .retries-row label {
        font-size: 11px;
        color: var(--text-2);
      }

      #retries {
        width: 50px;
        background: var(--bg-3);
        border: 1px solid var(--border-2);
        border-radius: var(--r-sm);
        color: var(--text);
        font-family: "DM Mono", monospace;
        font-size: 12px;
        padding: 4px 6px;
        text-align: center;
        outline: none;
        transition: border-color 0.15s;
      }

      #retries:focus {
        border-color: var(--accent-mid);
      }

      /* ── Footer ───────────────────────────────────────────────────── */
      .ft {
        display: flex;
        gap: 6px;
        padding: 10px 14px;
      }

      .ft-btn {
        flex: 1;
        padding: 7px 0;
        border-radius: var(--r-sm);
        background: var(--bg-2);
        border: 1px solid var(--border);
        color: var(--text-3);
        font-family: "DM Sans", sans-serif;
        font-size: 11px;
        font-weight: 500;
        cursor: pointer;
        transition: background 0.12s, color 0.12s, border-color 0.12s;
      }

      .ft-btn:hover {
        background: var(--bg-3);
        color: var(--text-2);
        border-color: var(--border-2);
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <div class="hd">
      <div class="hd-top">
        <div class="status-ring"></div>
        <span class="brand">Autoconsent</span>
      </div>
      <div class="hd-site">
        <span class="site-name" id="current-site">—</span>
        <!--
          Master toggle: <label> wraps checkbox + track + thumb.
          Clicking anywhere on the label activates the checkbox natively.
          #enabled:checked ~ .master-track/thumb CSS handles the visual.
        -->
        <label class="master-wrap">
          <input type="checkbox" id="enabled" name="enabled" checked />
          <div class="master-track"></div>
          <div class="master-thumb"></div>
        </label>
      </div>
    </div>

    <!-- Mode -->
    <div class="sec">
      <div class="sec-lbl">Mode</div>
      <div class="mode-row">
        <!--
          Mode pills: radio is hidden (opacity:0, width:0); <label for="">
          handles clicks natively. #optout:checked + .mpill-lbl CSS drives
          the highlight via the adjacent sibling selector.
        -->
        <div class="mpill">
          <input type="radio" id="optout" name="mode" value="optOut" checked />
          <label class="mpill-lbl" for="optout">Reject</label>
        </div>
        <div class="mpill">
          <input type="radio" id="optin" name="mode" value="optIn" />
          <label class="mpill-lbl" for="optin">Accept</label>
        </div>
        <div class="mpill">
          <input type="radio" id="prompt" name="mode" value="null" />
          <label class="mpill-lbl" for="prompt">Ask</label>
        </div>
      </div>
    </div>

    <!-- Protection -->
    <div class="sec">
      <div class="sec-lbl">Protection</div>

      <!--
        Each .stog contains (in DOM order):
          input[value="true"]  — the "on" radio
          input[value="false"] — the "off" radio
          label.stog-on-lbl    — covers stog when ON; for="X-off" turns it off
          label.stog-off-lbl   — covers stog when OFF; for="X-on" turns it on
          div.stog-track + div.stog-thumb — purely visual, CSS-driven

        The label that's currently visible is always the one pointing to
        the OPPOSITE state, so every click toggles. CSS :checked sibling
        selectors update both label visibility and the track/thumb visual.
      -->

      <div class="t-row">
        <span class="t-lbl">Pre-hide popups</span>
        <div class="stog">
          <input type="radio" id="prehide-on" name="prehide" value="true" checked />
          <input type="radio" id="prehide-off" name="prehide" value="false" />
          <label class="stog-on-lbl" for="prehide-off"></label>
          <label class="stog-off-lbl" for="prehide-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="t-row">
        <span class="t-lbl">Cosmetic rules</span>
        <div class="stog">
          <input type="radio" id="cosmetic-on" name="cosmetic" value="true" checked />
          <input type="radio" id="cosmetic-off" name="cosmetic" value="false" />
          <label class="stog-on-lbl" for="cosmetic-off"></label>
          <label class="stog-off-lbl" for="cosmetic-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="t-row">
        <span class="t-lbl">Generated rules</span>
        <div class="stog">
          <input type="radio" id="generated-on" name="generated" value="true" checked />
          <input type="radio" id="generated-off" name="generated" value="false" />
          <label class="stog-on-lbl" for="generated-off"></label>
          <label class="stog-off-lbl" for="generated-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="t-row">
        <span class="t-lbl">
          Unknown popups
          <span class="badge">β</span>
        </span>
        <div class="stog">
          <input type="radio" id="heuristic-action-on" name="heuristic-action" value="true" />
          <input type="radio" id="heuristic-action-off" name="heuristic-action" value="false" checked />
          <label class="stog-on-lbl" for="heuristic-action-off"></label>
          <label class="stog-off-lbl" for="heuristic-action-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="t-row">
        <span class="t-lbl">Highlight clicks</span>
        <div class="stog">
          <input type="radio" id="visual-test-on" name="visual-test" value="true" checked />
          <input type="radio" id="visual-test-off" name="visual-test" value="false" />
          <label class="stog-on-lbl" for="visual-test-off"></label>
          <label class="stog-off-lbl" for="visual-test-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>
    </div>

    <!-- Debug: native <details> accordion — no JavaScript needed -->
    <details class="dbg-details">
      <summary class="dbg-hd">
        <span class="dbg-hd-lbl">Debug logging</span>
        <svg class="dbg-chevron" viewBox="0 0 12 12" fill="none">
          <path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
        </svg>
      </summary>
      <div class="dbg-body">
        <div class="dbg-grid">
          <div class="dbg-chk">
            <input type="checkbox" id="logs-lifecycle" name="logs-lifecycle" checked />
            <label for="logs-lifecycle">Lifecycle</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-rulesteps" name="logs-rulesteps" checked />
            <label for="logs-rulesteps">Rule steps</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-detectionsteps" name="logs-detectionsteps" />
            <label for="logs-detectionsteps">Detection</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-waits" name="logs-waits" />
            <label for="logs-waits">Wait steps</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-evals" name="logs-evals" />
            <label for="logs-evals">Evals</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-errors" name="logs-errors" checked />
            <label for="logs-errors">Errors</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-messages" name="logs-messages" />
            <label for="logs-messages">Messages</label>
          </div>
        </div>
        <div class="retries-row">
          <label for="retries">Detection attempts</label>
          <input type="number" id="retries" name="retries" value="20" min="1" max="100" />
        </div>
      </div>
    </details>

    <!-- Footer -->
    <div class="ft">
      <button class="ft-btn" id="reload">↺ Reload rules</button>
      <button class="ft-btn" id="reset">Reset</button>
    </div>

    <script src="popup.bundle.js"></script>
    <!-- popup.safari.js must be a separate file: MV3 CSP blocks inline scripts -->
    <script src="popup.safari.js"></script>
  </body>
</html>
