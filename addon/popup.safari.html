<!doctype html>
<html lang="en" data-theme="system">
  <head>
    <meta charset="utf-8" />
    <meta name="color-scheme" content="dark light" />
    <style>
      /* ── Theme: CSS custom properties ──────────────────────────────── */

      html {
        /* Light defaults — also active for data-theme="light" */
        --bg:      #f5f5f7;
        --bg2:     #ffffff;
        --bg3:     rgba(118,118,128,0.12);
        --text:    #1c1c1e;
        --text2:   #3a3a3c;
        --text3:   #6e6e73;
        --text4:   #aeaeb2;
        --sep:     rgba(0,0,0,0.08);
        --sep2:    rgba(0,0,0,0.05);
        --acc:     #007aff;
        --on:      #34c759;
        --off:     #c7c7cc;
        --seg-bg:  #ffffff;
        --seg-sh:  0 1px 4px rgba(0,0,0,0.14);
        --tip-bg:  rgba(28,28,30,0.92);
        --tip-fg:  #ffffff;
      }

      html[data-theme="dark"] {
        --bg:      #1c1c1e;
        --bg2:     #2c2c2e;
        --bg3:     rgba(118,118,128,0.18);
        --text:    #ffffff;
        --text2:   #ebebf5;
        --text3:   #98989d;
        --text4:   #48484a;
        --sep:     rgba(255,255,255,0.1);
        --sep2:    rgba(255,255,255,0.06);
        --acc:     #0a84ff;
        --on:      #30d158;
        --off:     #3a3a3c;
        --seg-bg:  rgba(118,118,128,0.32);
        --seg-sh:  none;
        --tip-bg:  rgba(255,255,255,0.9);
        --tip-fg:  #1c1c1e;
      }

      @media (prefers-color-scheme: dark) {
        html[data-theme="system"] {
          --bg:      #1c1c1e;
          --bg2:     #2c2c2e;
          --bg3:     rgba(118,118,128,0.18);
          --text:    #ffffff;
          --text2:   #ebebf5;
          --text3:   #98989d;
          --text4:   #48484a;
          --sep:     rgba(255,255,255,0.1);
          --sep2:    rgba(255,255,255,0.06);
          --acc:     #0a84ff;
          --on:      #30d158;
          --off:     #3a3a3c;
          --seg-bg:  rgba(118,118,128,0.32);
          --seg-sh:  none;
          --tip-bg:  rgba(255,255,255,0.9);
          --tip-fg:  #1c1c1e;
        }
      }

      /* ── Base ─────────────────────────────────────────────────────── */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html {
        width: 260px;
        background: var(--bg);
        font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text",
                     "Helvetica Neue", sans-serif;
        font-size: 12px;
        color: var(--text);
        -webkit-font-smoothing: antialiased;
      }
      body { width: 260px; overflow: hidden; }

      /* ── Proceed button (injected dynamically by popup.bundle.js) ─── */
      #proceed {
        display: block;
        width: calc(100% - 20px);
        margin: 10px 10px 0;
        padding: 8px 0;
        border-radius: 8px;
        border: 1px solid rgba(0,122,255,0.3);
        background: rgba(0,122,255,0.08);
        color: var(--acc);
        font-family: inherit;
        font-size: 11px;
        font-weight: 600;
        cursor: pointer;
      }

      /* ── Header ───────────────────────────────────────────────────── */
      .ph {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px 9px;
        background: var(--bg2);
        border-bottom: 1px solid var(--sep);
      }
      .ph-brand {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 1px;
      }
      .ph-site {
        font-size: 13px;
        font-weight: 500;
        color: var(--text);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 120px;
      }
      .ph-right {
        display: flex;
        align-items: center;
        gap: 8px;
        flex-shrink: 0;
      }

      /* ── Theme segmented control ──────────────────────────────────── */
      .theme-seg {
        display: flex;
        gap: 1px;
        background: var(--bg3);
        border-radius: 6px;
        padding: 2px;
      }
      .ts-btn {
        padding: 3px 7px;
        border-radius: 4px;
        font-size: 10px;
        color: var(--text3);
        cursor: pointer;
        user-select: none;
        line-height: 1;
        transition: background 0.12s, color 0.12s, box-shadow 0.12s;
      }
      .ts-btn.active {
        background: var(--seg-bg);
        color: var(--acc);
        box-shadow: var(--seg-sh);
        font-weight: 600;
      }

      /* ── Master toggle ────────────────────────────────────────────── */
      .master-wrap {
        position: relative;
        width: 38px;
        height: 22px;
        flex-shrink: 0;
        cursor: pointer;
      }
      #enabled {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }
      .master-track {
        position: absolute;
        inset: 0;
        border-radius: 11px;
        background: var(--off);
        transition: background 0.18s;
      }
      .master-thumb {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 18px;
        height: 18px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 2px 6px rgba(0,0,0,0.22), 0 0 0 0.5px rgba(0,0,0,0.06);
        transition: transform 0.18s;
      }
      #enabled:checked ~ .master-track  { background: var(--on); }
      #enabled:checked ~ .master-thumb  { transform: translateX(16px); }

      /* ── Section ──────────────────────────────────────────────────── */
      .ps {
        padding: 8px 14px;
        border-bottom: 1px solid var(--sep);
      }
      .ps-lbl {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text3);
        margin-bottom: 6px;
      }

      /* ── Mode pills ───────────────────────────────────────────────── */
      .mode-seg {
        display: flex;
        background: var(--bg3);
        border-radius: 8px;
        padding: 2px;
        gap: 2px;
      }
      .mpill { position: relative; flex: 1; }
      .mpill input[type="radio"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }
      .mpill-lbl {
        display: block;
        text-align: center;
        padding: 5px 2px;
        border-radius: 6px;
        font-size: 11px;
        font-weight: 500;
        color: var(--text3);
        cursor: pointer;
        user-select: none;
        transition: background 0.12s, color 0.12s, box-shadow 0.12s;
      }
      #optout:checked + .mpill-lbl,
      #optin:checked  + .mpill-lbl,
      #prompt:checked + .mpill-lbl {
        background: var(--seg-bg);
        color: var(--text);
        font-weight: 600;
        box-shadow: var(--seg-sh);
      }

      /* ── Protection rows ──────────────────────────────────────────── */
      .pt-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 5px 0;
        border-bottom: 1px solid var(--sep2);
      }
      .pt-row:last-child { border-bottom: none; padding-bottom: 0; }
      .pt-lbl { font-size: 11.5px; color: var(--text2); }
      .pt-lbl .beta {
        font-size: 9px;
        font-weight: 600;
        color: var(--text3);
        margin-left: 3px;
      }

      /* ── Small toggle (radio pair) ────────────────────────────────── */
      /*
       * DOM order inside .stog:
       *   input[value="true"]   ← "on" radio
       *   input[value="false"]  ← "off" radio
       *   label.stog-on-lbl     ← visible when ON; clicking → turns off
       *   label.stog-off-lbl    ← visible when OFF; clicking → turns on
       *   div.stog-track        ← background pill
       *   div.stog-thumb        ← sliding circle
       *
       * CSS :checked siblings drive all visual state. popup.ts sets
       * .checked on the radio elements directly — no JS needed here.
       */
      .stog {
        position: relative;
        width: 31px;
        height: 18px;
        flex-shrink: 0;
      }
      .stog input[type="radio"] {
        position: absolute;
        opacity: 0;
        width: 0;
        height: 0;
        pointer-events: none;
      }
      .stog-on-lbl,
      .stog-off-lbl {
        display: none;
        position: absolute;
        inset: 0;
        z-index: 2;
        cursor: pointer;
      }
      .stog input[value="true"]:checked  ~ .stog-on-lbl  { display: block; }
      .stog input[value="false"]:checked ~ .stog-off-lbl { display: block; }

      .stog-track {
        position: absolute;
        inset: 0;
        border-radius: 9px;
        background: var(--off);
        transition: background 0.18s;
      }
      .stog-thumb {
        position: absolute;
        top: 2px;
        left: 2px;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #ffffff;
        box-shadow: 0 2px 6px rgba(0,0,0,0.22), 0 0 0 0.5px rgba(0,0,0,0.06);
        transition: transform 0.18s;
      }
      .stog input[value="true"]:checked ~ .stog-track { background: var(--on); }
      .stog input[value="true"]:checked ~ .stog-thumb { transform: translateX(13px); }

      /* ── Debug accordion ──────────────────────────────────────────── */
      .pdbg > summary {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 7px 14px;
        border-bottom: 1px solid var(--sep);
        cursor: pointer;
        list-style: none;
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--text3);
      }
      .pdbg > summary::-webkit-details-marker { display: none; }

      .dbg-chev {
        width: 10px;
        height: 10px;
        color: var(--text4);
        transition: transform 0.18s;
        flex-shrink: 0;
      }
      .pdbg[open] .dbg-chev { transform: rotate(180deg); }

      .pdbg-body {
        padding: 8px 14px 10px;
        border-bottom: 1px solid var(--sep);
        background: var(--bg2);
      }
      .dbg-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2px 8px;
        margin-bottom: 8px;
      }
      .dbg-chk {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 3px 0;
      }
      .dbg-chk input[type="checkbox"] {
        appearance: none;
        -webkit-appearance: none;
        width: 12px;
        height: 12px;
        border-radius: 3px;
        background: var(--bg3);
        border: 1px solid var(--sep);
        cursor: pointer;
        flex-shrink: 0;
        position: relative;
        transition: background 0.12s, border-color 0.12s;
      }
      .dbg-chk input[type="checkbox"]:checked {
        background: var(--on);
        border-color: var(--on);
      }
      .dbg-chk input[type="checkbox"]:checked::after {
        content: "";
        position: absolute;
        top: 0.5px;
        left: 3px;
        width: 4px;
        height: 7px;
        border: 1.5px solid #ffffff;
        border-top: none;
        border-left: none;
        transform: rotate(40deg);
      }
      .dbg-chk label {
        font-size: 11px;
        color: var(--text3);
        cursor: pointer;
      }
      .retries-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .retries-row label { font-size: 11px; color: var(--text3); }
      #retries {
        width: 52px;
        background: var(--bg3);
        border: 1px solid var(--sep);
        border-radius: 6px;
        color: var(--text);
        font-family: inherit;
        font-size: 12px;
        padding: 3px 6px;
        text-align: center;
        outline: none;
      }
      #retries:focus { border-color: var(--acc); }

      /* ── Footer ───────────────────────────────────────────────────── */
      .pft {
        padding: 8px 14px 6px;
        background: var(--bg2);
      }
      .pft-btns {
        display: flex;
        gap: 6px;
        margin-bottom: 7px;
      }
      .pft-btn {
        flex: 1;
        padding: 6px 0;
        border-radius: 7px;
        background: var(--bg3);
        border: none;
        font-size: 11px;
        font-weight: 500;
        color: var(--acc);
        cursor: pointer;
        font-family: inherit;
      }
      .pft-meta {
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .pft-version,
      .pft-rules { font-size: 9.5px; color: var(--text4); }
      .pft-link  { font-size: 9.5px; color: var(--acc); text-decoration: none; cursor: pointer; }
    </style>
  </head>
  <body>

    <!-- Header -->
    <div class="ph">
      <div>
        <div class="ph-brand">Autoconsent</div>
        <span class="ph-site" id="current-site">—</span>
      </div>
      <div class="ph-right">
        <div class="theme-seg">
          <div class="ts-btn"        data-scheme="light"  data-tip="Light mode">☀︎</div>
          <div class="ts-btn"        data-scheme="dark"   data-tip="Dark mode">◗</div>
          <div class="ts-btn active" data-scheme="system" data-tip="Follow system">A</div>
        </div>
        <label class="master-wrap" data-tip="Enable / disable for this site">
          <input type="checkbox" id="enabled" name="enabled" checked />
          <div class="master-track"></div>
          <div class="master-thumb"></div>
        </label>
      </div>
    </div>

    <!-- Mode -->
    <div class="ps">
      <div class="ps-lbl">Mode</div>
      <div class="mode-seg">
        <div class="mpill">
          <input type="radio" id="optout" name="mode" value="optOut" checked />
          <label class="mpill-lbl" for="optout" data-tip="Auto-reject cookie banners">Reject</label>
        </div>
        <div class="mpill">
          <input type="radio" id="optin" name="mode" value="optIn" />
          <label class="mpill-lbl" for="optin" data-tip="Auto-accept cookie banners">Accept</label>
        </div>
        <div class="mpill">
          <input type="radio" id="prompt" name="mode" value="null" />
          <label class="mpill-lbl" for="prompt" data-tip="Ask before acting">Ask</label>
        </div>
      </div>
    </div>

    <!-- Protection -->
    <div class="ps">
      <div class="ps-lbl">Protection</div>

      <div class="pt-row">
        <span class="pt-lbl" data-tip="Hide banners before they flash on screen">Pre-hide popups</span>
        <div class="stog">
          <input type="radio" id="prehide-on"  name="prehide" value="true"  checked />
          <input type="radio" id="prehide-off" name="prehide" value="false" />
          <label class="stog-on-lbl"  for="prehide-off"></label>
          <label class="stog-off-lbl" for="prehide-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="pt-row">
        <span class="pt-lbl" data-tip="Hide banners that have no reject button">Cosmetic rules</span>
        <div class="stog">
          <input type="radio" id="cosmetic-on"  name="cosmetic" value="true"  checked />
          <input type="radio" id="cosmetic-off" name="cosmetic" value="false" />
          <label class="stog-on-lbl"  for="cosmetic-off"></label>
          <label class="stog-off-lbl" for="cosmetic-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="pt-row">
        <span class="pt-lbl" data-tip="Auto-generated rules for thousands of sites">Generated rules</span>
        <div class="stog">
          <input type="radio" id="generated-on"  name="generated" value="true"  checked />
          <input type="radio" id="generated-off" name="generated" value="false" />
          <label class="stog-on-lbl"  for="generated-off"></label>
          <label class="stog-off-lbl" for="generated-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="pt-row">
        <span class="pt-lbl" data-tip="Heuristic detection for unrecognised banners">Unknown popups <span class="beta">(beta)</span></span>
        <div class="stog">
          <input type="radio" id="heuristic-action-on"  name="heuristic-action" value="true"  />
          <input type="radio" id="heuristic-action-off" name="heuristic-action" value="false" checked />
          <label class="stog-on-lbl"  for="heuristic-action-off"></label>
          <label class="stog-off-lbl" for="heuristic-action-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>

      <div class="pt-row">
        <span class="pt-lbl" data-tip="Flash a red outline around automated clicks">Highlight clicks</span>
        <div class="stog">
          <input type="radio" id="visual-test-on"  name="visual-test" value="true"  />
          <input type="radio" id="visual-test-off" name="visual-test" value="false" checked />
          <label class="stog-on-lbl"  for="visual-test-off"></label>
          <label class="stog-off-lbl" for="visual-test-on"></label>
          <div class="stog-track"></div>
          <div class="stog-thumb"></div>
        </div>
      </div>
    </div>

    <!-- Debug logging -->
    <details class="pdbg">
      <summary>
        Debug logging
        <svg class="dbg-chev" viewBox="0 0 10 10" fill="none">
          <path d="M2 3.5l3 3 3-3" stroke="currentColor" stroke-width="1.5"
                stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </summary>
      <div class="pdbg-body">
        <div class="dbg-grid">
          <div class="dbg-chk">
            <input type="checkbox" id="logs-lifecycle"      name="logs-lifecycle"      checked />
            <label for="logs-lifecycle"      data-tip="Log CMP lifecycle events">Lifecycle</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-rulesteps"      name="logs-rulesteps"      checked />
            <label for="logs-rulesteps"      data-tip="Log each rule step">Rule steps</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-detectionsteps" name="logs-detectionsteps" />
            <label for="logs-detectionsteps" data-tip="Log detection steps">Detection</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-waits"          name="logs-waits" />
            <label for="logs-waits"          data-tip="Log wait/sleep steps">Wait steps</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-evals"          name="logs-evals" />
            <label for="logs-evals"          data-tip="Log JS eval results">Evals</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-errors"         name="logs-errors"         checked />
            <label for="logs-errors"         data-tip="Log errors (recommended)">Errors</label>
          </div>
          <div class="dbg-chk">
            <input type="checkbox" id="logs-messages"       name="logs-messages" />
            <label for="logs-messages"       data-tip="Log extension messages">Messages</label>
          </div>
        </div>
        <div class="retries-row">
          <label for="retries">Detection attempts</label>
          <input type="number" id="retries" name="retries" value="20" min="1" max="100" />
        </div>
      </div>
    </details>

    <!-- Footer -->
    <div class="pft">
      <div class="pft-btns">
        <button class="pft-btn" id="reload" data-tip="Reload rules from extension bundle">↺ Reload rules</button>
        <button class="pft-btn" id="reset"  data-tip="Restore all settings to defaults">Reset</button>
      </div>
      <div class="pft-meta">
        <span class="pft-version" id="ext-version" data-tip="Extension version">—</span>
        <span class="pft-rules"   id="rules-date"  data-tip="Date rules were last built"></span>
        <a    class="pft-link"    id="gh-link"      data-tip="View source on GitHub" href="#">GitHub ↗</a>
      </div>
    </div>

    <script src="popup.bundle.js"></script>
    <!-- popup.safari.js must be a separate file: MV3 CSP blocks inline scripts -->
    <script src="popup.safari.js"></script>
  </body>
</html>
